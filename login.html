<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Corporativo | HackGov</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 font-sans flex items-center justify-center h-screen">

    <!-- VLibras Widget Element -->
    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>

    <div class="bg-white p-8 rounded-lg shadow-xl w-full max-w-md border border-slate-200">
        <div class="text-center mb-8">
            <span class="text-3xl font-black tracking-tighter text-blue-900">Hack<span class="text-blue-500">Gov</span></span>
            <p class="text-slate-500 text-sm mt-2">Painel de Gestão Urbana e Relatórios</p>
        </div>

        <form id="formLogin" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Usuário / Login</label>
                <input type="text" id="campoLogin" required autocomplete="off"
                    class="w-full px-4 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none" 
                    placeholder="ex: infra.joao">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Senha</label>
                <input type="password" id="campoSenha" required
                    class="w-full px-4 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none" 
                    placeholder="••••••••">
            </div>

            <button type="submit" id="btnEntrar"
                class="w-full bg-blue-950 text-white font-bold py-2.5 px-4 rounded-md hover:bg-blue-900 transition-colors shadow-md">
                Entrar no Sistema
            </button>
        </form>
        
        <div class="mt-6 text-center">
            <a href="inicio.html" class="text-sm text-blue-600 hover:underline">← Voltar ao Portal do Cidadão</a>
        </div>
    </div>

    <script>
        document.getElementById('formLogin').addEventListener('submit', async function(event) {
            event.preventDefault();
            
            const btn = document.getElementById('btnEntrar');
            btn.innerText = "Autenticando...";
            btn.disabled = true;

            const dadosLogin = {
                login: document.getElementById('campoLogin').value,
                senha: document.getElementById('campoSenha').value
            };

            try {
                const response = await fetch('http://localhost:8080/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dadosLogin)
                });

                if (response.ok) {
                    const resposta = await response.json();
                    
                    localStorage.setItem('hackgov_token', resposta.token);
                    localStorage.setItem('hackgov_perfil', resposta.perfil);
                    localStorage.setItem('hackgov_usuario', resposta.login);

                    window.location.href = 'dashboard.html';
                } else {
                    const erroTexto = await response.text();
                    alert(erroTexto || "Credenciais incorretas de acordo com a base Oracle.");
                }

            } catch (error) {
                console.error("Erro na autenticação:", error);
                alert("Não foi possível conectar à API de Segurança (Porta 8080).");
            } finally {
                btn.innerText = "Entrar no Sistema";
                btn.disabled = false;
            }
        });

        // Carregamento Isolado do VLibras
        window.addEventListener('DOMContentLoaded', () => {
            const scriptLibras = document.createElement('script');
            scriptLibras.src = "https://vlibras.gov.br/app/vlibras-plugin.js";
            scriptLibras.async = true;
            scriptLibras.onload = () => {
                if (window.VLibras && window.VLibras.Widget) {
                    new window.VLibras.Widget('https://vlibras.gov.br/app');
                }
            };
            document.body.appendChild(scriptLibras);
        });
    </script>
</body>
</html>
